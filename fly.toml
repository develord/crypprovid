# fly.toml - Configuration for CryptoAdviser API on Fly.io

app = "cryptoadviser-api"
primary_region = "cdg"  # Paris region (closest to Europe/MENA)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "40s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512  # 512MB RAM - $3.88/month
