services:
  - type: web
    name: crypto-adviser-api
    env: python
    region: frankfurt
    plan: free
    branch: main
    rootDir: api
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python main.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 8000
